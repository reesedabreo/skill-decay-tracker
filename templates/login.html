{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - SkillDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="auth-page">

    <div class="d-flex align-items-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-9">

                    <div class="auth-card">

                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <a href="{% url 'index' %}" class="fw-bold fs-4 text-decoration-none text-coffee-dark d-inline-flex align-items-center">
                                <i class="fas fa-brain me-2 text-caramel"></i>
                                SkillDK
                            </a>
                        </div>

                        <!-- Title -->
                        <h2 id="authTitle" class="fw-bold mb-4 text-center text-coffee-dark">
                            Welcome Back
                        </h2>

                        <!-- Form -->
                        <form method="POST">
                         {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-medium">Username</label>
                                <input type="text"
                                       class="form-control form-control-lg rounded-3"
                                       name="username"
                                       placeholder="John Doe"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Password</label>
                                <input type="password"
                                       class="form-control form-control-lg rounded-3"
                                       name="password"
                                       placeholder="••••••••"
                                       required>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember">
                                    <label class="form-check-label small" for="remember">
                                        Remember me
                                    </label>
                                </div>
                                <a href="{% url 'register' %}">
    Create Account
</a>
                            </div>
{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}
                            <button type="submit"
                                    class="btn btn-primary btn-lg w-100 fw-semibold py-3 mb-3 rounded-3">
                                <span id="authBtnText">Sign In</span>
                                <i class="fas fa-arrow-right ms-2"></i>
                            </button>

                        </form>

                        <!-- Divider -->
                        <div class="text-center my-4">
                            <span class="text-muted small">or continue with</span>
                        </div>

                        <!-- Social Buttons -->
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-dark rounded-3 py-3">
                                <i class="fab fa-google me-2"></i>
                                Continue with Google
                            </button>
                            <button class="btn btn-outline-dark rounded-3 py-3">
                                <i class="fab fa-github me-2"></i>
                                Continue with GitHub
                            </button>
                        </div>

                        <!-- Footer -->
                        <div class="text-center mt-4">
                            <small class="text-muted">
                                By signing in, you agree to our
                                <a href="#" class="text-caramel text-decoration-none">Terms</a>
                                and
                                <a href="#"           </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App JS -->
   <script src="{% static 'js/app.js' %}"></script>

</body>
</html>
