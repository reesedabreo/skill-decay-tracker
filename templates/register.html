{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Account - SkillDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="auth-page">

    <div class="d-flex align-items-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-9">

                    <div class="auth-card">

                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <a href="{% url 'index' %}" class="fw-bold fs-4 text-decoration-none text-coffee-dark">
                                SkillDK
                            </a>
                        </div>

                        <h2 class="fw-bold mb-4 text-center text-coffee-dark">
                            Create Account
                        </h2>

                        {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-medium">Username</label>
                                <input type="text" class="form-control form-control-lg rounded-3" name="username"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Email</label>
                                <input type="email" class="form-control form-control-lg rounded-3" name="email"
                                    required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-medium">Password</label>
                                <input type="password" class="form-control form-control-lg rounded-3" name="password"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold py-3 rounded-3">
                                Register
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <small>
                                Already have an account?
                                <a href="{% url 'login' %}" class="text-decoration-none text-caramel">
                                    Sign In
                                </a>
                            </small>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
